<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>댕냥이 분양센터</title>

<style>
body{
  margin:0;
  font-family:'Noto Sans KR',sans-serif;
  background:#f3f4f6;
}

header{
  background:#ff6b6b;
  color:white;
  padding:18px;
  text-align:center;
}

header h1{margin:0;font-size:22px;}
.sub{font-size:13px;opacity:0.9;}

.info{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  font-size:14px;
}

/* 📝 글쓰기 박스 */
.form-box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.form-box input, .form-box select, .form-box textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.form-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff6b6b;
  color:white;
  cursor:pointer;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.tabs button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#ddd;
}

.tabs button.active{
  background:#ff6b6b;
  color:white;
}

.container{padding:10px;}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.tag{
  font-size:12px;
  background:#eee;
  display:inline-block;
  padding:3px 8px;
  border-radius:10px;
}

h3{margin:5px 0;}
.meta{font-size:13px;color:#555;}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>🐶🐱 댕냥이 분양센터</h1>
  <div class="sub">건강한 반려동물의 새로운 가족을 찾아드립니다</div>
</header>

<div class="info">
  <div>🐶 강아지 <span id="dogCount">0</span>마리</div>
  <div>🐱 고양이 <span id="catCount">0</span>마리</div>
  <div>👀 오늘 방문 <span id="todayCount">0</span></div>
</div>

<!-- 📝 글쓰기 기능 -->
<div class="form-box">
  <h3>➕ 반려동물 등록</h3>

  <input id="name" placeholder="이름">
  
  <select id="type">
    <option value="dog">🐶 강아지</option>
    <option value="cat">🐱 고양이</option>
  </select>

  <select id="sex">
    <option value="남아">남아</option>
    <option value="여아">여아</option>
  </select>

  <textarea id="info" placeholder="설명"></textarea>

  <button onclick="addPet()">등록하기</button>
</div>

<div class="tabs">
  <button class="active" onclick="filterPets('all', this)">전체</button>
  <button onclick="filterPets('dog', this)">🐶 강아지</button>
  <button onclick="filterPets('cat', this)">🐱 고양이</button>
</div>

<div class="container" id="list"></div>

<footer>© 2026 댕냥이 분양센터</footer>

<script>

/* ======================
   🐾 데이터 (localStorage)
====================== */
let pets = JSON.parse(localStorage.getItem('pets')) || [
  {type:'dog', name:'말티푸', sex:'여아', info:'활발하고 애교 많음'},
  {type:'dog', name:'푸들', sex:'남아', info:'똑똑하고 훈련 잘됨'},
  {type:'cat', name:'러시안블루', sex:'여아', info:'조용하고 깨끗함'}
];

let currentFilter = 'all';

/* ======================
   💾 저장
====================== */
function savePets(){
  localStorage.setItem('pets', JSON.stringify(pets));
}

/* ======================
   ➕ 글쓰기 기능
====================== */
function addPet(){
  const name = document.getElementById('name').value;
  const type = document.getElementById('type').value;
  const sex = document.getElementById('sex').value;
  const info = document.getElementById('info').value;

  if(!name || !info){
    alert('이름과 설명을 입력해주세요!');
    return;
  }

  pets.push({type, name, sex, info});
  savePets();

  document.getElementById('name').value = '';
  document.getElementById('info').value = '';

  updateCounts();
  renderPets();
}

/* ======================
   👀 방문자 카운트
====================== */
function updateVisitor(){
  const today = new Date().toDateString();
  const saved = JSON.parse(localStorage.getItem('visitData')) || {};

  if(saved.date !== today){
    saved.date = today;
    saved.count = 1;
  } else {
    saved.count += 1;
  }

  localStorage.setItem('visitData', JSON.stringify(saved));
  document.getElementById('todayCount').innerText = saved.count;
}

/* ======================
   🧮 카운트
====================== */
function updateCounts(){
  const dogCount = pets.filter(p => p.type === 'dog').length;
  const catCount = pets.filter(p => p.type === 'cat').length;

  document.getElementById('dogCount').innerText = dogCount;
  document.getElementById('catCount').innerText = catCount;
}

/* ======================
   🧾 리스트
====================== */
function renderPets(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  const filtered = pets.filter(p =>
    currentFilter === 'all' ? true : p.type === currentFilter
  );

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <span class="tag">${p.type === 'dog' ? '🐶 강아지' : '🐱 고양이'}</span>
      <h3>${p.name}</h3>
      <div class="meta">성별: ${p.sex}</div>
      <div class="meta">${p.info}</div>
    `;

    list.appendChild(card);
  });
}

/* ======================
   🎛 필터
====================== */
function filterPets(type, btn){
  currentFilter = type;

  document.querySelectorAll('.tabs button')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  renderPets();
}

/* ======================
   🚀 실행
====================== */
updateVisitor();
updateCounts();
renderPets();

</script>

</body>
</html>

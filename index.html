<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>댕냥이 분양센터</title>

<style>
  body{
    font-family: Arial;
    background:#f5f6f7;
    margin:0;
    padding:20px;
  }

  h1{
    text-align:center;
  }

  .top-info{
    text-align:center;
    margin-bottom:20px;
  }

  .tab-btn{
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    border-radius:8px;
    background:#ddd;
  }

  .active{
    background:#333;
    color:#fff;
  }

  .form-box{
    margin:20px auto;
    max-width:400px;
    background:#fff;
    padding:15px;
    border-radius:10px;
  }

  input, select{
    width:100%;
    padding:8px;
    margin:5px 0;
  }

  button{
    cursor:pointer;
  }

  #petList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    margin-top:20px;
  }

  .pet-card{
    background:#fff;
    padding:10px;
    border-radius:10px;
    text-align:center;
  }

  .pet-card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
  }

  .pet-card button{
    margin-top:5px;
    padding:5px;
    width:100%;
  }
</style>
</head>

<body>

<h1>🐶🐱 댕냥이 분양센터</h1>

<div class="top-info">
  🐶 강아지 <span id="dogCount">0</span>마리 |
  🐱 고양이 <span id="catCount">0</span>마리 |
  👀 방문자 <span id="visitorCount">0</span>
</div>

<div style="text-align:center;">
  <button class="tab-btn active" data-type="dog">강아지</button>
  <button class="tab-btn" data-type="cat">고양이</button>
</div>

<!-- ✍️ 글쓰기 -->
<div class="form-box">
  <h3>🐾 분양 글쓰기</h3>

  <input id="petName" placeholder="이름" />
  
  <select id="petType">
    <option value="dog">강아지</option>
    <option value="cat">고양이</option>
  </select>

  <input id="petImage" placeholder="이미지 URL" />

  <button id="addBtn">등록하기</button>
</div>

<!-- 리스트 -->
<div id="petList"></div>

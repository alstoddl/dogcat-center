<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>댕냥이 분양센터</title>

<style>
body{
  margin:0;
  font-family:'Noto Sans KR',sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#ffcc4d;
  text-align:center;
  padding:30px;
}

h1{ margin:0; }

#count{
  color:#666;
  font-size:14px;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px;
}

.menu button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

/* BOARD */
.board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  width:250px;
  background:#fff7a8;
  border-radius:15px;
  padding:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.1);
  position:relative;
}

.pin{
  position:absolute;
  top:5px;
  right:10px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  color:white;
  font-size:12px;
}

.dog{ background:#4caf50; }
.cat{ background:#ff9800; }

.footer{
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>🐶🐱 댕냥이 분양센터</h1>
  <p>건강한 반려동물의 새로운 가족을 찾아드립니다</p>

  <p>
    강아지 <span id="dogCount">0</span>마리 |
    고양이 <span id="catCount">0</span>마리 등록
  </p>

  <div id="count">(today : 0)</div>
</header>

<div class="menu">
  <button onclick="showPets('dog')">🐶 강아지</button>
  <button onclick="showPets('cat')">🐱 고양이</button>
</div>

<div class="board">

  <div class="card dog-card">
    <div class="pin">📌</div>
    <span class="badge dog">강아지</span>
    <h3>말티푸</h3>
    <p>성별 : 여아</p>
    <p>접종 완료</p>
    <p>2개월</p>
  </div>

  <div class="card dog-card">
    <div class="pin">📌</div>
    <span class="badge dog">강아지</span>
    <h3>포메라니안</h3>
    <p>성별 : 남아</p>
    <p>접종 완료</p>
    <p>2개월</p>
  </div>

  <div class="card cat-card">
    <div class="pin">📌</div>
    <span class="badge cat">고양이</span>
    <h3>실버뱅갈</h3>
    <p>성별 : 남아</p>
    <p>건강검진 완료</p>
    <p>3개월</p>
  </div>

  <div class="card cat-card">
    <div class="pin">📌</div>
    <span class="badge cat">고양이</span>
    <h3>브리티시숏헤어</h3>
    <p>성별 : 여아</p>
    <p>건강검진 완료</p>
    <p>2개월</p>
  </div>

</div>

<div class="footer">
  © 2026 댕냥이 분양센터
</div>

<script>
// 🐶🐱 필터 기능
function showPets(type){
  const dogs = document.querySelectorAll('.dog-card');
  const cats = document.querySelectorAll('.cat-card');

  if(type === 'dog'){
    dogs.forEach(el => el.style.display = 'block');
    cats.forEach(el => el.style.display = 'none');
  } else {
    dogs.forEach(el => el.style.display = 'none');
    cats.forEach(el => el.style.display = 'block');
  }
}

// 📊 동물 카운트
function updatePetCounts(){
  const dogCount = document.querySelectorAll('.dog-card').length;
  const catCount = document.querySelectorAll('.cat-card').length;

  document.getElementById('dogCount').textContent = dogCount;
  document.getElementById('catCount').textContent = catCount;
}

// 👀 방문자 카운트 (localStorage)
function updateVisitorCount(){
  const today = new Date().toISOString().slice(0,10);

  let savedDate = localStorage.getItem("visitDate");
  let count = parseInt(localStorage.getItem("visitCount") || "0");

  if(savedDate !== today){
    count = 0;
    localStorage.setItem("visitDate", today);
  }

  count++;

  localStorage.setItem("visitCount", count);

  document.getElementById("count").textContent =
    "(today : " + count + ")";
}

// 🚀 초기 실행
window.onload = function(){
  showPets('dog');
  updatePetCounts();
  updateVisitorCount();
};
</script>

</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>댕냥이 분양센터</title>

<style>
body{
  margin:0;
  font-family:'Noto Sans KR',sans-serif;
  background:#f3f4f6;
}

/* HEADER */
header{
  background:#ff6b6b;
  color:white;
  padding:18px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:22px;
}

.sub{
  font-size:13px;
  opacity:0.9;
}

/* INFO BAR */
.info{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  font-size:14px;
}

/* FILTER */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.tabs button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#ddd;
}

.tabs button.active{
  background:#ff6b6b;
  color:white;
}

/* CARD */
.container{
  padding:10px;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.tag{
  font-size:12px;
  background:#eee;
  display:inline-block;
  padding:3px 8px;
  border-radius:10px;
}

h3{
  margin:5px 0;
}

.meta{
  font-size:13px;
  color:#555;
}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>🐶🐱 댕냥이 분양센터</h1>
  <div class="sub">건강한 반려동물의 새로운 가족을 찾아드립니다</div>
</header>

<div class="info">
  <div>🐶 강아지 <span id="dogCount">0</span>마리</div>
  <div>🐱 고양이 <span id="catCount">0</span>마리</div>
  <div>(today : <span id="todayCount">0</span>)</div>
</div>

<div class="tabs">
  <button class="active" onclick="filter('all')">전체</button>
  <button onclick="filter('dog')">🐶 강아지</button>
  <button onclick="filter('cat')">🐱 고양이</button>
</div>

<div class="container" id="list"></div>

<footer>© 2026 댕냥이 분양센터</footer>

<script>
const pets = [
  {type:'dog', name:'말티푸', sex:'여아', info:'접종 완료', age:'2개월'},
  {type:'dog', name:'포메라니안', sex:'남아', info:'접종 완료', age:'2개월'},
  {type:'cat', name:'실버뱅갈', sex:'남아', info:'건강검진 완료', age:'3개월'},
  {type:'cat', name:'브리티시숏헤어', sex:'여아', info:'건강검진 완료', age:'2개월'}
];

let today = 0;

function render(filterType){
  const list = document.getElementById('list');
  list.innerHTML = "";

  let dog = 0;
  let cat = 0;

  pets.forEach(p=>{
    if(p.type === 'dog') dog++;
    if(p.type === 'cat') cat++;

    if(filterType !== 'all' && p.type !== filterType) return;

    list.innerHTML += `
      <div class="card">
        <div class="tag">${p.type === 'dog' ? '🐶 강아지' : '🐱 고양이'}</div>
        <h3>${p.name}</h3>
        <div class="meta">성별 : ${p.sex}</div>
        <div class="meta">${p.info}</div>
        <div class="meta">${p.age}</div>
      </div>
    `;
  });

  document.getElementById('dogCount').innerText = dog;
  document.getElementById('catCount').innerText = cat;
  document.getElementById('todayCount').innerText = today;
}

function filter(type){
  document.querySelectorAll('.tabs button')
    .forEach(b=>b.classList.remove('active'));

  event.target.classList.add('active');
  render(type);
}

render('all');
</script>

</body>
</html

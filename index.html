<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>댕냥이 메모</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Noto Sans KR",sans-serif;
  background:#f2f2f7;
}

/* 상단 */
header{
  background:#fff;
  padding:15px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #e5e5ea;
}

/* 입력 영역 */
.inputBox{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:14px;
  box-shadow:0 1px 2px rgba(0,0,0,0.05);
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #e5e5ea;
  font-size:14px;
  background:#fff;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
  font-weight:600;
}

/* 리스트 (아이폰 메모 리스트 느낌) */
.list{
  margin:10px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #e5e5ea;
}

/* 메모 한 줄 */
.item{
  padding:12px;
  border-bottom:1px solid #e5e5ea;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item:last-child{
  border-bottom:none;
}

.left{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.name{
  font-size:15px;
  font-weight:500;
}

.desc{
  font-size:13px;
  color:#8e8e93;
}

.tag{
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:#f2f2f7;
  color:#555;
}

.actions button{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#ff3b30;
}
</style>
</head>

<body>

<header>🐶🐱 댕냥이 메모</header>

<div class="inputBox">
  <input id="name" placeholder="이름">
  <select id="type">
    <option value="dog">🐶 강아지</option>
    <option value="cat">🐱 고양이</option>
  </select>
  <textarea id="info" placeholder="설명"></textarea>

  <button onclick="add()">메모 추가</button>
</div>

<div class="list" id="list"></div>

<script>

let pets = JSON.parse(localStorage.getItem("pets")) || [];

/* 저장 */
function save(){
  localStorage.setItem("pets", JSON.stringify(pets));
}

/* 추가 */
function add(){
  if(!name.value || !info.value) return;

  pets.push({
    id:Date.now(),
    name:name.value,
    type:type.value,
    info:info.value
  });

  save();
  render();
}

/* 삭제 */
function del(id){
  pets = pets.filter(p=>p.id!==id);
  save();
  render();
}

/* 렌더 */
function render(){

  const list = document.getElementById("list");
  list.innerHTML="";

  pets.forEach(p=>{

    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div class="left">
        <div class="name">${p.name}</div>
        <div class="desc">${p.info}</div>
      </div>

      <div style="display:flex;gap:8px;align-items:center">
        <span class="tag">${p.type==="dog"?"🐶":"🐱"}</span>
        <button onclick="del(${p.id})">삭제</button>
      </div>
    `;

    list.appendChild(div);
  });
}

render();

</script>

</body>
</html>ㅏ

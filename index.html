<header>
  <h1>🐶🐱 댕냥이 분양센터</h1>
  <p>건강한 반려동물의 새로운 가족을 찾아드립니다</p>
  <div id="count">(today : 0)</div>
</header>

<style>
.notice{
  background:#fff;
  border-left:6px solid #ffcc4d;
  padding:15px;
  margin:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px;
}

.menu button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#ffcc4d;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
</style>

<div class="notice">
  <h2>📢 공지사항</h2>

  <p>
    ① 프로필 없이 연락하거나 사적인 만남만을 반복적으로 요구하는 경우
    [교무실]에 제보해 주세요.
  </p>

  <p>
    ② 연락 시에는 서로 존중하는 마음으로 경어체를 사용해 주세요.
  </p>

  <p>
    ③ 단톡방 및 오픈채팅에서는 프로필을 설정하고 예의 있게 연락해 주세요.
  </p>
</div>

<div class="menu">
  <button onclick="showPets('dog')">🐶 강아지</button>
  <button onclick="showPets('cat')">🐱 고양이</button>
</div>

<div class="board">

  <div class="card dog-card">
    <div class="pin">📌</div>
    <span class="badge dog">강아지</span>
    <h3>말티푸</h3>
    <p>성별 : 여아</p>
    <p>접종 완료</p>
    <p>2개월</p>
  </div>

  <div class="card dog-card">
    <div class="pin">📌</div>
    <span class="badge dog">강아지</span>
    <h3>포메라니안</h3>
    <p>성별 : 남아</p>
    <p>접종 완료</p>
    <p>2개월</p>
  </div>

  <div class="card cat-card">
    <div class="pin">📌</div>
    <span class="badge cat">고양이</span>
    <h3>실버뱅갈</h3>
    <p>성별 : 남아</p>
    <p>건강검진 완료</p>
    <p>3개월</p>
  </div>

</div>

<script>
function showPets(type){

  const dogs = document.querySelectorAll('.dog-card');
  const cats = document.querySelectorAll('.cat-card');

  if(type === 'dog'){
    dogs.forEach(el => el.style.display='block');
    cats.forEach(el => el.style.display='none');
  }else{
    dogs.forEach(el => el.style.display='none');
    cats.forEach(el => el.style.display='block');
  }
}

function updateVisitorCount(){

  const today = new Date().toISOString().slice(0,10);

  let savedDate = localStorage.getItem("visitDate");
  let count = parseInt(localStorage.getItem("visitCount") || "0");

  if(savedDate !== today){
    count = 0;
    localStorage.setItem("visitDate", today);
  }

  count++;

  localStorage.setItem("visitCount", count);

  document.getElementById("count").textContent =
    "(today : " + count + ")";
}

window.onload = function(){
  showPets('dog');
  updateVisitorCount();
}
</script>

<style>
.menu{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:20px;
}

.menu button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ffcc4d;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
</style>

<div class="menu">
  <button onclick="showPets('dog')">🐶 강아지</button>
  <button onclick="showPets('cat')">🐱 고양이</button>
</div>

<div class="container">
  <div class="board">

    <div class="card dog-card">
      <div class="pin">📌</div>
      <span class="badge dog">강아지</span>
      <h3>말티푸</h3>
      <p>성별 : 여아</p>
      <p>접종 완료</p>
      <p>2개월</p>
    </div>

    <div class="card cat-card">
      <div class="pin">📌</div>
      <span class="badge cat">고양이</span>
      <h3>실버뱅갈</h3>
      <p>성별 : 남아</p>
      <p>건강검진 완료</p>
      <p>3개월</p>
    </div>

    <div class="card dog-card">
      <div class="pin">📌</div>
      <span class="badge dog">강아지</span>
      <h3>포메라니안</h3>
      <p>성별 : 남아</p>
      <p>접종 완료</p>
      <p>2개월</p>
    </div>

  </div>
</div>

<script>
function showPets(type){

  const dogs = document.querySelectorAll('.dog-card');
  const cats = document.querySelectorAll('.cat-card');

  if(type === 'dog'){
    dogs.forEach(el => el.style.display='block');
    cats.forEach(el => el.style.display='none');
  } else {
    dogs.forEach(el => el.style.display='none');
    cats.forEach(el => el.style.display='block');
  }
}

window.onload = function(){
  showPets('dog');
}
</script>

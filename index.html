<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>댕냥이 포스트잇 보드</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e9ecef;
}

/* 📌 보드 */
.board{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

/* 📌 포스트잇 */
.card{
  width:200px;
  min-height:140px;
  background:#fff8a6;
  padding:12px;
  border-radius:8px;
  box-shadow:5px 6px 0 rgba(0,0,0,.15);
  position:absolute;
  cursor:grab;
  user-select:none;
}

.card:active{
  cursor:grabbing;
}

/* 라벨 */
.badge{
  font-size:12px;
  padding:3px 6px;
  border-radius:6px;
  color:white;
}

.dog{background:#ff9f43;}
.cat{background:#6c5ce7;}

/* 삭제 버튼 */
.del{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>

/* =========================
   🔥 Firebase 설정 (여기 수정)
========================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   🧲 드래그 상태
========================= */
let activeCard = null;
let offsetX = 0;
let offsetY = 0;

/* =========================
   📥 데이터 로드
========================= */
async function load(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  const snap = await db.collection("pets").get();

  snap.forEach(doc=>{
    const d = doc.data();

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = doc.id;

    card.innerHTML = 
      <span class="badge ${d.type}">${d.type}</span>
      <h3>${d.name}</h3>
      <p>${d.info}</p>
      <button class="del">X</button>
    ;

    card.style.left = (d.x || 50) + "px";
    card.style.top = (d.y || 50) + "px";

    /* 삭제 */
    card.querySelector(".del").onclick = async (e)=>{
      e.stopPropagation();
      await db.collection("pets").doc(doc.id).delete();
      load();
    };

    board.appendChild(card);
  });
}

/* =========================
   💾 위치 저장
========================= */
function save(id, x, y){
  db.collection("pets").doc(id).update({x,y});
}

/* =========================
   🖱️ 드래그 시작
========================= */
document.addEventListener("mousedown", start);
document.addEventListener("touchstart", start);

function start(e){
  const card = e.target.closest(".card");
  if(!card) return;

  activeCard = card;

  const rect = card.getBoundingClientRect();

  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  offsetX = x - rect.left;
  offsetY = y - rect.top;

  document.addEventListener("mousemove", move);
  document.addEventListener("touchmove", move);
  document.addEventListener("mouseup", end);
  document.addEventListener("touchend", end);
}

/* =========================
   📍 이동
========================= */
function move(e){
  if(!activeCard) return;

  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;

  const nx = x - offsetX;
  const ny = y - offsetY;

  activeCard.style.left = nx + "px";
  activeCard.style.top = ny + "px";
}

/* =========================
   🛑 종료 + 저장
========================= */
function end(){
  if(activeCard){
    save(
      activeCard.dataset.id,
      parseInt(activeCard.style.left),
      parseInt(activeCard.style.top)
    );
  }

  activeCard = null;

  document.removeEventListener("mousemove", move);
  document.removeEventListener("touchmove", move);
  document.removeEventListener("mouseup", end);
  document.removeEventListener("touchend", end);
}
  /* =========================
   🚀 실행
========================= */
window.onload = function(){
  load();
};

</script>
</body>
</html>

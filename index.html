<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>댕냥이 분양센터</title>

<style>
body{
  margin:0;
  font-family:'Noto Sans KR',sans-serif;
  background:#f3f4f6;
}
header{
  background:#ff6b6b;
  color:white;
  padding:18px;
  text-align:center;
}
header h1{margin:0;font-size:22px;}
.sub{font-size:13px;opacity:0.9;}

.info{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  font-size:14px;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}
.tabs button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#ddd;
}
.tabs button.active{
  background:#ff6b6b;
  color:white;
}

.container{padding:10px;}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.tag{
  font-size:12px;
  background:#eee;
  display:inline-block;
  padding:3px 8px;
  border-radius:10px;
}

h3{margin:5px 0;}
.meta{font-size:13px;color:#555;}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<header>
  <h1>🐶🐱 댕냥이유치원 분양센터</h1>
  <div class="sub">
    강아지 [ S,ky,ft,GP,RB,cd]
    고양이 [ D,kr,rg,FT,Lv]
  </div>
</header>

<div class="info">
  <div>🐶 강아지 <span id="dogCount">0</span>마리</div>
  <div>🐱 고양이 <span id="catCount">0</span>마리</div>
  <div>👀 오늘 방문 <span id="todayCount">0</span></div>
</div>

<div class="tabs">

  <button onclick="filterPets('dog', this)">🐶 강아지</button>
  <button onclick="filterPets('cat', this)">🐱 고양이</button>
</div>

<div class="container" id="list"></div>

<footer>© 2026 댕냥이 분양센터</footer>

<script>
/* ======================
   🐾 데이터
====================== */
  
const API = "https://pet-center-api-es4v.onrender.com/api";
// 개발 중이라면 PC에서는
// const API = "http://localhost:3000/api";

let pets = [];
let currentFilter = "all";

/* ======================
   👀 방문자 카운트 (매일 초기화)
====================== */
function updateVisitor(){
  const today = new Date().toDateString();
  const saved = JSON.parse(localStorage.getItem('visitData')) || {};

  if(saved.date !== today){
    saved.date = today;
    saved.count = 1;
  } else {
    saved.count += 1;
  }

  localStorage.setItem('visitData', JSON.stringify(saved));
  document.getElementById('todayCount').innerText = saved.count;
}

/* ======================
   🧮 카운트 업데이트
====================== */
function updateCounts(){
  const dogCount = pets.filter(p => p.type === 'dog').length;
  const catCount = pets.filter(p => p.type === 'cat').length;

  document.getElementById('dogCount').innerText = dogCount;
  document.getElementById('catCount').innerText = catCount;
}

/* ======================
   🧾 리스트 출력
====================== */
function renderPets(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  const filtered = pets.filter(p => 
    currentFilter === 'all' ? true : p.type === currentFilter
  );

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <span class="tag">${p.type === 'dog' ? '🐶 강아지' : '🐱 고양이'}</span>
      <h3>${p.name}</h3>
      <div class="meta">성별: ${p.sex}</div>
      <div class="meta">${p.info}</div>
    `;

    list.appendChild(card);
  });
}

/* ======================
   🎛 필터
====================== */
function filterPets(type, btn){
  currentFilter = type;

  document.querySelectorAll('.tabs button')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  renderPets();
}

/* ======================
   🚀 초기 실행
====================== */
updateVisitor();
loadPets();
</script>
async function loadPets() {
    const res = await fetch(API + "/pets");
    pets = await res.json();

    updateCounts();
    renderPets();
}
</body>
</html>
